    cursor:pointer; letter-spacing:.01em; transition:background .12s, color .12s;

  #keywordSearch{

    .drag-handle .dot{display:none;}
    .resize-handle{
      display:block; position:absolute; width:28px; height:28px; z-index:7;

    .resize-handle[data-corner="tr"]{top:14px; right:14px; cursor:nesw-resize;}

    .resize-handle[data-corner="br"]{bottom:14px; right:14px; cursor:nwse-resize;}

    }
    .resize-handle:hover::after{opacity:1;}

  .blob{
    position:absolute; transform:translate(-50%,-50%);
    background:#8a8a8a; border:1px solid #aaa; color:#fff;
    padding:10px 14px; max-width:130px; font-size:10.5px; line-height:1.25;
    text-align:center; cursor:pointer; font-family:'IBM Plex Mono',monospace;
    z-index:2; transition:opacity .25s ease, transform .32s cubic-bezier(.34,1.56,.64,1), left .2s ease, top .2s ease;
    border-radius:56% 44% 52% 48% / 42% 58% 40% 60%;
  }
  .blob:nth-child(6n+2){border-radius:44% 56% 60% 40% / 55% 45% 60% 40%;}
  .blob:nth-child(6n+3){border-radius:62% 38% 42% 58% / 40% 60% 44% 56%;}
  .blob:nth-child(6n+4){border-radius:46% 54% 40% 60% / 58% 42% 55% 45%;}
  .blob:nth-child(6n+5){border-radius:54% 46% 58% 42% / 36% 64% 42% 58%;}
  .blob:nth-child(6n+0){border-radius:38% 62% 55% 45% / 62% 38% 56% 44%;}
  .blob:hover{border-width:1.5px; background:#9a9a9a; transform:translate(-50%,-50%) scale(1.15); z-index:4;}
  .blob.is-dim{opacity:.12; pointer-events:none;}
  .blob.is-match{transform:translate(-50%,-50%) scale(1.4); z-index:5; border-width:1.5px; border-color:#fff; background:#e8e8e8; color:#1a1a1a; box-shadow:0 0 0 4px rgba(255,255,255,.9);}

  #overlay{

  #overlay.is-on{opacity:1; pointer-events:auto;}
  #detail{
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);

    max-height:85vh; overflow-y:auto; border-radius:40px;

  #detail h4{margin:0 0 14px; font-size:20px; font-weight:500; font-family:'Newsreader',serif; color:#fff;}
  #detail .field{margin-bottom:12px;}
  #detail .field-label{font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:#888; margin-bottom:3px;}
  #detail .field-value{font-size:13.5px; font-family:'Newsreader',serif; color:#fff; line-height:1.5;}
  #detail .close-btn{

  }
  .link-window{display:block; border:1px solid #444; text-decoration:none; overflow:hidden; margin-top:4px; border-radius:20px;}
  .link-window-bar{background:#222; display:flex; align-items:center; gap:5px; padding:6px 8px;}
  .link-window-bar .dot{width:6px; height:6px; border-radius:50%; background:#777; display:inline-block;}
  .link-window-host{font-family:'IBM Plex Mono',monospace; font-size:9.5px; color:#aaa; margin-left:4px; letter-spacing:.02em;}
  .link-window img{width:100%; display:block; filter:grayscale(1) contrast(1.05); background:#333;}
  .link-window:hover .link-window-bar{background:#111;}
  .observer-btn{
    font-family:'IBM Plex Mono',monospace; font-size:11px; padding:9px 16px; margin-top:4px;

  .observer-btn:hover{background:#ccc;}
  .observer-status{font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:#999; margin-top:8px;}
  .observer-video{width:100%; margin-top:10px; border:1px solid #444; border-radius:20px; filter:grayscale(1) contrast(1.1);}

  const TITLE_PAGES = [
    {
      title: null,
      html: `
        <h1>Precedent Study of <span class="proj">Saydnaya</span></h1>
        <p>Forensic Architecture and Amnesty International's 2016 spatial and acoustic reconstruction of Saydnaya military prison, Syria. Built entirely from witness testimony, since no photographs of the prison's interior exist.</p>
        <p class="method">This study treats the project as a single plateau rather than a set of separate sections. Each node in the rhizome is drawn directly from the analysis database: classified by which attribute it runs through, whether it acts as an intermediary or a mediator, and what kind of actant it is (human, non-human, or force), following Gilles Deleuze and Felix Guattari's "Rhizome Theory" and Latour's "Actor-Network Theory".</p>
      `
    },
    {
      title: 'Methodology',
      html: `
        <h2>Project's Methodology</h2>
        <h4>Software / modeling approach</h4>
        <p>Forensic Architecture built an initial 3D model from satellite imagery and prior written interviews (Dec 2015–Feb 2016), then refined it interactively with five survivors in Istanbul (April 2016) using architect-guided 3D modeling software as each witness described rooms, doors, and remembered objects.</p>
        <h4>Acoustic method</h4>
        <p>Lawrence Abu Hamdan led the collection of "ear-witness testimony": tone-matching to decibel levels, and "echo profiling," playing reverberations and matching them to remembered sounds, to determine room and corridor size where sight was impossible.</p>
        <h4>Data provenance</h4>
        <p>Three sources converge: architectural/spatial testimony, satellite imagery, and acoustic memory.</p>
        <h4>Theoretical method</h4>
        <p>Weizman and Keenan's "forensic aesthetics" (<em>Mengele's Skull</em>, 2012), treating how evidence is sensed and presented as inseparable from the evidence itself.</p>
      `
    },
    {
      title: 'Rhetorical Analysis',
      html: `
        <h2>Rhetorical Analysis</h2>
        <h4>Central argument</h4>
        <p>The Syrian state's refusal of independent monitors is itself evidence of what it is hiding. Testimony, usually treated as "soft" evidence, is presented with the same rigor as architectural and acoustic data.</p>
        <h4>Persuasive mechanism</h4>
        <p>The two navigation modes (by location / by witness) refuse a single authoritative narrative, a cartography, not a tracing.</p>
        <h4>Why "critical"</h4>
        <p>The site argues by exposing its own evidentiary method, how the model was built, how sound was used, rather than by implying a conclusion outright.</p>
        <h4>Procedural rhetoric</h4>
        <p>Following Bogost, the drag-to-look interface persuades through enacted disorientation; you navigate the blindness the witnesses describe, rather than just reading about it.</p>
      `
    },
    {
      title: "Wider Practice",
      html: `
        <h2>Author's Wider Practice</h2>
        <p>Saydnaya (2016) sits early in Forensic Architecture's now 76+ investigations across 45+ countries, partnering with Amnesty International, the UN Special Rapporteur on Counter-Terrorism and Human Rights, Human Rights Watch, and Bellingcat.</p>
        <h4>Methodological throughline</h4>
        <p>Combining "warm data" (testimony) with "cold data" (satellite imagery, acoustic modeling) recurs across FA's catalog. Saydnaya is close to a paradigm case, pushed further toward testimony than most FA projects since the site has zero available photographic "cold data."</p>
        <h4>Theoretical throughline</h4>
        <p>Weizman describes forensic architecture as an "archaeology of the very recent past" and as building "new forums" for judgment; Saydnaya's public interactive site is a literal forum, not just a report.</p>
      `
    },
    {
      title: 'Personal Assessment',
      html: `
        <h2>Personal Assessment</h2>
        <h4>Appraisal / Criticism</h4>
        <p>Saydnaya succeeds specifically because it treats absence (no photographs) as the generative tension rather than an obstacle; the whole method stems from that constraint. Refusing to rank testimony below "harder" evidence types is a real epistemological argument, not just a workaround. Though the site's reliance on external services (video, embeds) is a reminder that these evidentiary interactive elements are fragile as long-term historical records.</p>
      `
    },
    {

      html: `

        <div class="bib-entry">Amnesty International, "Explore Saydnaya." <a href="https://saydnaya.amnesty.org/?kind=explore" target="_blank" rel="noopener">saydnaya.amnesty.org</a></div>

        <div class="bib-entry">Amnesty International, "About," Explore Saydnaya. <a href="https://saydnaya.amnesty.org/en/about.html" target="_blank" rel="noopener">saydnaya.amnesty.org/en/about.html</a></div>
        <div class="bib-entry">Amnesty International, <em>Human Slaughterhouse: Mass Hangings and Extermination at Saydnaya Prison, Syria</em> (Feb. 2017). <a href="https://www.amnesty.org/en/documents/mde24/5415/2017/en/" target="_blank" rel="noopener">amnesty.org</a></div>
        <div class="bib-entry">Lawrence Abu Hamdan, project note on <em>Saydnaya</em>. <a href="http://lawrenceabuhamdan.com/saydnaya" target="_blank" rel="noopener">lawrenceabuhamdan.com/saydnaya</a></div>

  }

  function getTileRectsInCanvasLocal() {
    if (!isDesktopLayout()) return [];
    const canvasRect = canvas.getBoundingClientRect();
    return tileEls.map(t => {
      const r = t.getBoundingClientRect();
      return {
        left: (r.left - TILE_MARGIN - canvasRect.left) / currentScale,
        right: (r.right + TILE_MARGIN - canvasRect.left) / currentScale,
        top: (r.top - TILE_MARGIN - canvasRect.top) / currentScale,
        bottom: (r.bottom + TILE_MARGIN - canvasRect.top) / currentScale
      };
    });
  }

  function resolveDisplacedPositions() {
    const tileRects = getTileRectsInCanvasLocal();
    const result = positions.map(p => ({ x: p.x, y: p.y }));
    for (let pass = 0; pass < 8; pass++) {
      // boundary: keep every node within the currently visible part of the rhizome — same rule, every edge
      result.forEach((p, i) => {
        const rad = blobRadii[i];
        p.x = Math.max(visibleLocal.left + rad, Math.min(p.x, visibleLocal.right - rad));
        p.y = Math.max(visibleLocal.top + rad, Math.min(p.y, visibleLocal.bottom - rad));
      });

      // nodes: keep every pair of nodes from overlapping each other
      for (let i = 0; i < result.length; i++) {
        for (let j = i + 1; j < result.length; j++) {
          const dx = result[j].x - result[i].x, dy = result[j].y - result[i].y;
          let dist = Math.sqrt(dx * dx + dy * dy) || 0.01;
          const minDist = blobRadii[i] + blobRadii[j] + 8;
          if (dist < minDist) {
            const overlap = (minDist - dist) / 2;
            const ux = dx / dist, uy = dy / dist;
            result[i].x -= ux * overlap; result[i].y -= uy * overlap;
            result[j].x += ux * overlap; result[j].y += uy * overlap;
          }
        }
      }

      // tiles: clear any tile a node has drifted into — but the push itself is bounded to the
      // same visible edges above, so it can never overshoot past a boundary the way a later,
      // separate reconciliation pass could (that mismatch was the actual left/right bug)
      result.forEach((p, i) => {
        const rad = blobRadii[i];
        tileRects.forEach(t => {
          const tl = t.left - rad, tr = t.right + rad, tt = t.top - rad, tb = t.bottom + rad;
          if (p.x > tl && p.x < tr && p.y > tt && p.y < tb) {
            const dLeft = p.x - tl, dRight = tr - p.x, dTop = p.y - tt, dBottom = tb - p.y;
            const minD = Math.min(dLeft, dRight, dTop, dBottom);
            if (minD === dLeft) p.x = Math.max(visibleLocal.left + rad, tl - 4);
            else if (minD === dRight) p.x = Math.min(visibleLocal.right - rad, tr + 4);
            else if (minD === dTop) p.y = Math.max(visibleLocal.top + rad, tt - 4);
            else p.y = Math.min(visibleLocal.bottom - rad, tb + 4);
          }
        });
      });
    }
    return result;
  }

  function renderRhizome() {
    const displaced = resolveDisplacedPositions();
    nodes.forEach((n, i) => {
      const el = document.getElementById(`node-${i}`);
      if (el) { el.style.left = `${displaced[i].x}px`; el.style.top = `${displaced[i].y}px`; }
    });
    document.querySelectorAll('.line, .thread').forEach(line => {
      const a = +line.dataset.a, b = +line.dataset.b;
      line.setAttribute('x1', displaced[a].x); line.setAttribute('y1', displaced[a].y);
      line.setAttribute('x2', displaced[b].x); line.setAttribute('y2', displaced[b].y);
    });
  }

  let rafPending = false;
  function requestRhizomeUpdate() {
    if (rafPending) return;
    rafPending = true;
    requestAnimationFrame(() => { renderRhizome(); rafPending = false; });
  }

  function getTileBox(tile) {
    const r = tile.getBoundingClientRect();
    const f = appFrame.getBoundingClientRect();
    return { left: r.left - f.left, top: r.top - f.top, width: r.width, height: r.height };
  }
  function setTileBox(tile, left, top) {
    tile.style.left = `${left}px`;
    tile.style.top = `${top}px`;
    tile.style.right = 'auto'; tile.style.bottom = 'auto';
  }
  function resolveTileCollisions(activeTile) {
    const TILE_GAP = 10;
    const frameW = appFrame.clientWidth, frameH = appFrame.clientHeight;
    const aBox = getTileBox(activeTile);
    tileEls.filter(t => t !== activeTile).forEach(other => {
      const bBox = getTileBox(other);
      const overlapX = Math.min(aBox.left + aBox.width, bBox.left + bBox.width) - Math.max(aBox.left, bBox.left);
      const overlapY = Math.min(aBox.top + aBox.height, bBox.top + bBox.height) - Math.max(aBox.top, bBox.top);
      if (overlapX > 0 && overlapY > 0) {
        let newLeft = bBox.left, newTop = bBox.top;
        if (overlapX < overlapY) {
          newLeft = bBox.left < aBox.left ? aBox.left - bBox.width - TILE_GAP : aBox.left + aBox.width + TILE_GAP;
        } else {
          newTop = bBox.top < aBox.top ? aBox.top - bBox.height - TILE_GAP : aBox.top + aBox.height + TILE_GAP;
        }
        newLeft = Math.max(10, Math.min(newLeft, frameW - bBox.width - 10));
        newTop = Math.max(10, Math.min(newTop, frameH - bBox.height - 10));
        setTileBox(other, newLeft, newTop);
      }
    });
  }

  function makeDraggable(tile) {
    const handle = tile.querySelector('.drag-handle');
    if (!handle) return;
    let dragging = false, startX, startY, startLeft, startTop;
    handle.addEventListener('mousedown', (e) => {
      if (!isDesktopLayout()) return;
      dragging = true;
      rhizomeSection.classList.add('is-adjusting');
      const rect = tile.getBoundingClientRect();
      const frameRect = appFrame.getBoundingClientRect();
      startLeft = rect.left - frameRect.left;
      startTop = rect.top - frameRect.top;
      startX = e.clientX; startY = e.clientY;
      tile.style.left = `${startLeft}px`;
      tile.style.top = `${startTop}px`;
      tile.style.right = 'auto'; tile.style.bottom = 'auto';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });
    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const EDGE = 10;
      const frameW = appFrame.clientWidth, frameH = appFrame.clientHeight;
      const tileW = tile.offsetWidth, tileH = tile.offsetHeight;
      let newLeft = startLeft + (e.clientX - startX);
      let newTop = startTop + (e.clientY - startY);
      newLeft = Math.max(EDGE, Math.min(newLeft, frameW - tileW - EDGE));
      newTop = Math.max(EDGE, Math.min(newTop, frameH - tileH - EDGE));
      tile.style.left = `${newLeft}px`;
      tile.style.top = `${newTop}px`;
      resolveTileCollisions(tile);
      requestRhizomeUpdate();
    });
    window.addEventListener('mouseup', () => {
      if (dragging) {
        dragging = false;
        document.body.style.userSelect = '';
        requestRhizomeUpdate();
        setTimeout(() => rhizomeSection.classList.remove('is-adjusting'), 300);
      }
    });
  }

  function makeResizable(tile) {
    tile.querySelectorAll('.resize-handle').forEach(handle => {
      const corner = handle.dataset.corner;
      let resizing = false, startX, startY, startW, startH, startLeft, startTop;
      handle.addEventListener('mousedown', (e) => {
        if (!isDesktopLayout()) return;
        resizing = true;
        rhizomeSection.classList.add('is-adjusting');
        const rect = tile.getBoundingClientRect();
        const frameRect = appFrame.getBoundingClientRect();
        startW = rect.width; startH = rect.height;
        startLeft = rect.left - frameRect.left; startTop = rect.top - frameRect.top;
        startX = e.clientX; startY = e.clientY;
        document.body.style.userSelect = 'none';
        e.preventDefault(); e.stopPropagation();
      });
      window.addEventListener('mousemove', (e) => {
        if (!resizing) return;
        const dx = e.clientX - startX, dy = e.clientY - startY;
        const frameW = appFrame.clientWidth, frameH = appFrame.clientHeight;
        let newW = startW, newH = startH, newLeft = startLeft, newTop = startTop;
        if (corner === 'br') { newW = startW + dx; newH = startH + dy; }
        else if (corner === 'bl') { newW = startW - dx; newH = startH + dy; newLeft = startLeft + dx; }
        else if (corner === 'tr') { newW = startW + dx; newH = startH - dy; newTop = startTop + dy; }
        else if (corner === 'tl') { newW = startW - dx; newH = startH - dy; newLeft = startLeft + dx; newTop = startTop + dy; }
        newW = Math.max(220, newW); newH = Math.max(140, newH);
        newLeft = Math.max(10, Math.min(newLeft, frameW - newW - 10));
        newTop = Math.max(10, Math.min(newTop, frameH - newH - 10));
        tile.style.width = `${newW}px`; tile.style.height = `${newH}px`;
        tile.style.left = `${newLeft}px`; tile.style.top = `${newTop}px`;
        tile.style.right = 'auto'; tile.style.bottom = 'auto';
        resolveTileCollisions(tile);
        requestRhizomeUpdate();
      });
      window.addEventListener('mouseup', () => {
        if (resizing) {
          resizing = false;
          document.body.style.userSelect = '';
          requestRhizomeUpdate();
          setTimeout(() => rhizomeSection.classList.remove('is-adjusting'), 300);
        }
      });
    });
  }
  tileEls.forEach(makeDraggable);
  tileEls.forEach(makeResizable);
  renderRhizome();

  let activeStream = null;

  function openDetail(n, e) {
    let linkField;
    if (n.node === "Co-Observer/Co-Author") {
      linkField = `
        <button class="observer-btn" id="observerBtn">Become an observer</button>
        <div class="observer-status" id="observerStatus"></div>
        <video class="observer-video" id="observerVideo" autoplay muted playsinline style="display:none;"></video>
      `;
    } else if (n.url) {
      linkField = `<a class="link-window" href="${n.url}" target="_blank" rel="noopener">
           <div class="link-window-bar">
             <span class="dot"></span><span class="dot"></span><span class="dot"></span>
             <span class="link-window-host">${new URL(n.url).hostname}</span>
           </div>
           <img src="https://image.thum.io/get/width/500/grayscale/noanimate/${n.url}" alt="Preview of ${n.node}'s linked page" loading="lazy" />
         </a>`;
    } else {
      linkField = `<div class="field-value" style="opacity:.6;">No linked page</div>`;
    }
    detail.innerHTML = `
      <button class="close-btn" id="closeDetail">close ✕</button>
      <div class="tags">${n.multiplicity.map(m => `<span class="tag">${m}</span>`).join('')}</div>
      <h4>${n.node}</h4>
      <div class="field"><div class="field-label">Ontological Typology</div><div class="field-value">${n.typology}</div></div>
      <div class="field"><div class="field-label">Actant Class</div><div class="field-value">${n.actant}</div></div>
      <div class="field"><div class="field-label">Summary</div><div class="field-value">${n.summary}</div></div>
      <div class="field"><div class="field-label">Link</div>${linkField}</div>
    `;
    detail.classList.add('is-on');
    overlay.classList.add('is-on');
    document.getElementById('closeDetail').addEventListener('click', closeDetail);

    if (n.node === "Co-Observer/Co-Author") {
      const btn = document.getElementById('observerBtn');
      const status = document.getElementById('observerStatus');
      const video = document.getElementById('observerVideo');
      btn.addEventListener('click', async () => {
        status.textContent = 'Requesting camera access\u2026';
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
          activeStream = stream;
          video.srcObject = stream;
          video.style.display = 'block';
          btn.style.display = 'none';
          status.textContent = 'You are now the observer.';
        } catch (err) {
          status.textContent = 'Camera access was denied or unavailable.';
        }
      });
    }
  }
  function closeDetail() {
    detail.classList.remove('is-on');
    overlay.classList.remove('is-on');
    if (activeStream) {
      activeStream.getTracks().forEach(t => t.stop());
      activeStream = null;
    }
  }
  overlay.addEventListener('click', closeDetail);
</script>
</body>
</html>
